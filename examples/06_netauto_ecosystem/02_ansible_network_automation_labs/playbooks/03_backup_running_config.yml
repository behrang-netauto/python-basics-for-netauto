- name: Render network running-config backup summary report
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    backup_targets: "{{ groups['network_devices'] | default([]) }}"

  tasks:
    - name: Render backup summary report
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost']['command_output_dir'] }}/backup_report.md"
        mode: "0644"
        content: |
          # Network Running-Config Backup Report

          Run ID: `{{ hostvars['localhost']['run_id'] }}`

          | Host | Mgmt IP | Platform | Status | Command | Backup path | Error |
          |---|---|---|---|---|---|---|
          {% for host in backup_targets %}
          | {{ host }} | {{ hostvars[host].ansible_host | default('n/a') }} | {{ hostvars[host].backup_platform | default(hostvars[host].platform | default('n/a')) }} | {{ hostvars[host].backup_status | default('not-run') }} | {{ hostvars[host].backup_command | default('n/a') }} | {{ hostvars[host].backup_path | default('n/a') }} | {{ hostvars[host].backup_error | default('') }} |
          {% endfor %}

          ## Notes

          Raw running-config backup files are stored under:

          `evidence_pack/command_outputs/{{ hostvars['localhost']['run_id'] }}/running_config_backups/`
