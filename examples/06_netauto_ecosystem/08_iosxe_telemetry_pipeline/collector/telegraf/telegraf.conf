
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = true
  debug = false
  quiet = false
  logfile = ""

[[inputs.cisco_telemetry_mdt]]
  transport = "grpc"
  service_address = ":57000"
  
  # Pass 3A: server-auth TLS
  tls_cert = "/etc/telegraf/certs/telegraf-fullchain.pem"
  tls_key  = "/etc/telegraf/certs/telegraf-key.pem"

  # Pass 3B later (mTLS):
  # tls_allowed_cacerts = ["/etc/telegraf/certs/ca.pem"]

[[outputs.influxdb_v2]]
  urls = ["http://127.0.0.1:8086"]
  token = "telemetry-dev-token"
  organization = "lab"
  bucket = "iosxe_telemetry"
